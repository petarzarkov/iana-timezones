name: Build CI

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 */7 * *'

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CI: true
jobs:
  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Install
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Test Coverage
        run: bun run test:cov
      - name: Install badgen-cli and Generate Coverage Badge
        run: |
          bun add -g badgen-cli

          COV=$(bun -e 't=require(`./coverage/coverage-summary.json`).total,process.stdout.write(String(Math.min(...`lines|statements|functions|branches`.split(`|`).map(k=>t[k].pct))))')

          if [ "$COV" -ge 95 ]; then
            COLOR="green"
          else
            COLOR="orange"
          fi

          badgen -j coverage -s $COV% -c $COLOR > coverage/coverage.svg
      - name: Setup Pages
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && success()
        uses: actions/configure-pages@v4
      - name: Upload artifact
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: './coverage'
      - name: Deploy to GitHub Pages
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && success()
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Version and generate timezones
        id: versioning
        env:
          ORIGINAL_COMMIT_SHA: ${{ github.sha }}
          ORIGINAL_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          VERSIONING_OUTPUT=$(bun run versioning)
          echo "$VERSIONING_OUTPUT"
          OUTPUT=$(echo "$VERSIONING_OUTPUT" | tail -n 1)
          echo "result $OUTPUT"
          echo "result=$OUTPUT" >> "$GITHUB_OUTPUT"
      - name: Build
        if: steps.versioning.outputs.result != 'SKIP'
        run: bun run build
      - name: Publish
        if: steps.versioning.outputs.result != 'SKIP'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
          XDG_CONFIG_HOME=$HOME bun publish --access public --no-git-checks
